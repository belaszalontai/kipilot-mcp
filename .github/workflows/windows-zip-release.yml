name: windows-zip-release

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-windows-zip:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: "x64"

      - name: Build Windows ZIP artifact
        shell: pwsh
        run: .\build-windows-zip.ps1 -ForceInstall -Clean

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: kipilot-mcp-windows-zip
          path: artifacts/*.zip
          if-no-files-found: error

      - name: Attach ZIP to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip